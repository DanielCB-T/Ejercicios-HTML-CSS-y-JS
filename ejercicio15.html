<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de datos de estudiantes</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
    <script src="js/ejercicio15.js"></script>
</head>
<body>

    <div class="contenedor">

        <form>
            <label>Ingrese el nombre completo del estudiante</label>
            <input type="text" id="nombreEst" required>

            <label>Ingrese la calificacion</label>
            <input type="number" id="calificacion" min="0" max="100" required>
        </form>

        <button onclick="registra()" class="agregar">Agregar alumno</button>
        <button onclick="calcular()">Calcular</button>

        <textarea id="promedio"></textarea>
        <textarea id="calfAlta"></textarea>
        <textarea id="calfBaja"></textarea> 
    </div>
    
</body>
</html>
