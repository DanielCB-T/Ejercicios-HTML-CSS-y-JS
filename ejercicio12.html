<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content ="width=device-with, initial-scale=1.0">
        <title>CalcuGrad</title>
        <link rel="stylesheet" href="css/ejercicio12.css">
        <script src="js/ejercicio12.js"></script>
    </head>
    <body>
        
        <div class="contenedor">
            <div class="cabeza">
                <h1>Convertidor</h1>
                <h2>Calculadora para la conversión de pesos MXN a dollar USD</h2>
            </div>
            
            <p class="texto">Ingrese el valor en el siguiente campo.</p>
            <div class="contenido">
                <input type="number" id="mxn" placeholder="Ej: 500" required>
                <p class="igual">=</p>
                <textarea name="dollar" id="dollar" readonly>USD</textarea>
            </div>

            <div class="botonCont">
                <button onclick="convertir()">Convertir</button>
            </div>
                        
        </div>
    </body>
</html>
