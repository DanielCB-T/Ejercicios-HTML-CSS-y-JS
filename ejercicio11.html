<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content ="width=device-with, initial-scale=1.0">
        <title>CalcuGrad</title>
        <link rel="stylesheet" href="css/ejercicio11.css">
        <script src="js/ejercicio11.js"></script>
    </head>
    <body>
        
        <div class="contenedor">
            <div class="cabeza">
                <h1>Convertidor</h1>
                <h2>Calculadora para la conversión de kilometros a millas</h2>
            </div>
            
            <p class="texto">Ingrese el valor en el siguiente campo.</p>
            <div class="contenido">
                <input type="number" id="km" placeholder="Ej: 5">
                <p class="igual">=</p>
                <textarea name="milla" id="milla" readonly>M</textarea>
            </div>

            <div class="botonCont">
                <button onclick="convertir()">Convertir</button>
            </div>
                        
        </div>
    </body>
